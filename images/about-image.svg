<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400" fill="none">
  <!-- Background Elements -->
  <rect x="0" y="0" width="600" height="400" fill="#F8F9FF" opacity="0.5"/>
  <circle cx="300" cy="200" r="150" fill="#E8EEFF" opacity="0.3"/>
  
  <!-- Office Building -->
  <rect x="100" y="100" width="200" height="200" fill="#1E3A8A" rx="5"/>
  <rect x="110" y="110" width="180" height="190" fill="#FFFFFF" rx="3"/>
  
  <!-- Windows -->
  <rect x="130" y="130" width="30" height="30" fill="#E8EEFF" rx="2"/>
  <rect x="180" y="130" width="30" height="30" fill="#E8EEFF" rx="2"/>
  <rect x="230" y="130" width="30" height="30" fill="#E8EEFF" rx="2"/>
  
  <rect x="130" y="180" width="30" height="30" fill="#E8EEFF" rx="2"/>
  <rect x="180" y="180" width="30" height="30" fill="#E8EEFF" rx="2"/>
  <rect x="230" y="180" width="30" height="30" fill="#E8EEFF" rx="2"/>
  
  <rect x="130" y="230" width="30" height="30" fill="#E8EEFF" rx="2"/>
  <rect x="180" y="230" width="30" height="30" fill="#E8EEFF" rx="2"/>
  <rect x="230" y="230" width="30" height="30" fill="#E8EEFF" rx="2"/>
  
  <!-- Door -->
  <rect x="180" y="270" width="40" height="30" fill="#1E3A8A" rx="2"/>
  
  <!-- Team Members -->
  <!-- Person 1 (Executive) -->
  <circle cx="350" cy="150" r="25" fill="#FF9800"/>
  <rect x="345" y="175" width="10" height="40" fill="#1E3A8A"/>
  <rect x="335" y="195" width="30" height="10" fill="#1E3A8A"/>
  <rect x="335" y="215" width="10" height="20" fill="#1E3A8A"/>
  <rect x="355" y="215" width="10" height="20" fill="#1E3A8A"/>
  
  <!-- Person 2 -->
  <circle cx="400" cy="170" r="20" fill="#FF9800"/>
  <rect x="395" y="190" width="10" height="35" fill="#1E3A8A"/>
  <rect x="385" y="205" width="30" height="10" fill="#1E3A8A"/>
  <rect x="385" y="225" width="10" height="15" fill="#1E3A8A"/>
  <rect x="405" y="225" width="10" height="15" fill="#1E3A8A"/>
  
  <!-- Person 3 -->
  <circle cx="450" cy="160" r="22" fill="#FF9800"/>
  <rect x="445" y="182" width="10" height="38" fill="#1E3A8A"/>
  <rect x="435" y="200" width="30" height="10" fill="#1E3A8A"/>
  <rect x="435" y="220" width="10" height="18" fill="#1E3A8A"/>
  <rect x="455" y="220" width="10" height="18" fill="#1E3A8A"/>
  
  <!-- Financial Elements -->
  <!-- Pie Chart -->
  <circle cx="500" cy="300" r="40" fill="#FFFFFF" stroke="#1E3A8A" stroke-width="2"/>
  <path d="M500,300 L500,260 A40,40 0 0,1 535,315 Z" fill="#1E3A8A"/>
  <path d="M500,300 L535,315 A40,40 0 0,1 480,338 Z" fill="#FF9800"/>
  <path d="M500,300 L480,338 A40,40 0 0,1 500,260 Z" fill="#3B82F6"/>
  
  <!-- Bar Chart -->
  <rect x="350" y="280" width="20" height="60" fill="#1E3A8A" rx="2"/>
  <rect x="380" y="290" width="20" height="50" fill="#FF9800" rx="2"/>
  <rect x="410" y="270" width="20" height="70" fill="#1E3A8A" rx="2"/>
  <rect x="440" y="300" width="20" height="40" fill="#FF9800" rx="2"/>
  
  <!-- Line -->
  <line x1="350" y1="340" x2="460" y2="340" stroke="#1E3A8A" stroke-width="2"/>
  
  <!-- Experience Badge -->
  <circle cx="150" cy="320" r="30" fill="#FF9800"/>
  <text x="150" y="315" font-family="Arial" font-size="14" fill="white" text-anchor="middle" font-weight="bold">10+</text>
  <text x="150" y="335" font-family="Arial" font-size="8" fill="white" text-anchor="middle">YEARS</text>
  
  <!-- Clients Badge -->
  <circle cx="220" cy="320" r="30" fill="#1E3A8A"/>
  <text x="220" y="315" font-family="Arial" font-size="14" fill="white" text-anchor="middle" font-weight="bold">5000+</text>
  <text x="220" y="335" font-family="Arial" font-size="8" fill="white" text-anchor="middle">CLIENTS</text>
  
  <!-- Decorative Elements -->
  <circle cx="100" cy="50" r="20" fill="#FF9800" opacity="0.5"/>
  <circle cx="130" cy="70" r="15" fill="#1E3A8A" opacity="0.5"/>
  <circle cx="70" cy="80" r="10" fill="#FF9800" opacity="0.5"/>
  
  <circle cx="500" cy="50" r="20" fill="#FF9800" opacity="0.5"/>
  <circle cx="530" cy="70" r="15" fill="#1E3A8A" opacity="0.5"/>
  <circle cx="470" cy="80" r="10" fill="#FF9800" opacity="0.5"/>
</svg>